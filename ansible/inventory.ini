# Ansible inventory for quantum-sniffer scans
#
# Usage examples:
#   ansible-playbook -i inventory.ini run-quantum-sniffer.yml
#   ansible-playbook -i inventory.ini run-quantum-sniffer.yml -l production
#   ansible-playbook -i inventory.ini run-quantum-sniffer.yml -e "scan_target=10.1.1.0/24"

[scan_targets:children]
production
staging
test

[production]
# Production servers to scan
# web-prod-1 ansible_host=10.1.1.50 ansible_user=upce
# web-prod-2 ansible_host=10.1.1.51 ansible_user=upce
# db-prod-1 ansible_host=10.1.1.100 ansible_user=upce

[staging]
# Staging servers to scan
# web-staging-1 ansible_host=10.1.2.50 ansible_user=upce
# db-staging-1 ansible_host=10.1.2.100 ansible_user=upce

[test]
# Test/development servers
# localhost ansible_connection=local

[scan_targets:vars]
# Common variables for all scan targets
ansible_python_interpreter=/usr/bin/python3
# ansible_become=yes  # Uncomment if sudo needed
# ansible_become_password="{{ lookup('env', 'ANSIBLE_BECOME_PASSWORD') }}"
